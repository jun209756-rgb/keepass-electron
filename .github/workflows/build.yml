name: Build & Release with Attestation

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
        shell: pwsh

      - name: Build Python backend (PyInstaller)
        run: |
          cd backend
          pyinstaller keepass_backend.spec --distpath ../backend-dist --workpath ../backend-build --noconfirm
        shell: pwsh

      - name: Install Node dependencies
        run: npm install --no-audit --no-fund
        shell: pwsh

      - name: Build React frontend
        run: npm run build
        shell: pwsh

      - name: Build Electron portable EXE
        run: npx electron-builder --win portable --x64 --publish never
        shell: pwsh

      - name: Build Electron installer EXE
        run: npx electron-builder --win nsis --x64 --publish never
        shell: pwsh

      - name: List release artifacts
        run: Get-ChildItem release\ | Format-Table Name, Length
        shell: pwsh

      - name: Upload portable EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/KeePassStudio-Portable-*-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/KeePassStudio-Setup-*-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Attestation for portable EXE
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: release/KeePassStudio-Portable-*-x64.exe

      - name: Generate Attestation for installer EXE
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: release/KeePassStudio-Setup-*-x64.exe

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'python']

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
